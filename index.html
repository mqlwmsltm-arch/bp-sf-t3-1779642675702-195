    <style>
        /* RESET */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html {
            scroll-behavior: smooth;
            font-size: 16px;
        }
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: Impact, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.2;
            min-height: 100vh;
            padding: 0;
            margin: 0;
            max-width: none;
            width: 100%;
            overflow-x: hidden;
        }

        /* TYPOGRAPHY */
        h1,
        h2,
        h3,
        h4,
        h5,
        h6 {
            font-family: Impact, system-ui, sans-serif;
            font-weight: 700;
            letter-spacing: -0.02em;
            text-transform: uppercase;
            color: #ffffff;
            margin: 0;
        }
        h1 {
            font-size: clamp(3.2rem, 12vw, 6rem);
            line-height: 0.9;
            color: #ffffff;
            text-shadow: 4px 4px 0 #ff3b00;
        }
        h2 {
            font-size: clamp(2.4rem, 7vw, 4rem);
            border-left: 6px solid #ff3b00;
            padding-left: 24px;
        }
        h3 {
            font-size: 1.8rem;
        }
        p,
        li,
        a,
        blockquote,
        figcaption {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-weight: 400;
        }
        a {
            color: #ff3b00;
            text-decoration: none;
            border-bottom: 2px solid transparent;
            transition: border-color 0.15s ease;
        }
        a:hover,
        a:focus {
            border-bottom-color: #ff3b00;
        }
        strong {
            color: #ff3b00;
            font-weight: 700;
        }

        /* LAYOUT – full bleed, asymmetric, spaced */
        header,
        main,
        footer {
            width: 100%;
            max-width: none;
            padding: 72px 48px;
        }
        section {
            padding: 72px 0;
            margin-bottom: 120px;
            position: relative;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 24px;
        }
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 48px;
            align-items: start;
        }
        .asymmetric {
            display: grid;
            grid-template-columns: 3fr 2fr;
            gap: 72px;
        }
        .bleed-left {
            margin-left: -48px;
            padding-left: 48px;
            background: #111;
            border: 4px solid #ff3b00;
            transform: rotate(-1deg);
        }
        .bleed-right {
            margin-right: -48px;
            padding-right: 48px;
            background: #111;
            border: 4px solid #ff3b00;
            transform: rotate(1deg);
        }
        .overlap {
            margin-top: -80px;
            position: relative;
            z-index: 2;
        }
        .skew-box {
            transform: skewX(-2deg);
            background: #0a0a0a;
            border: 4px solid #ff3b00;
            padding: 32px 40px;
        }
        .skew-box>* {
            transform: skewX(2deg);
        }

        /* BUTTONS */
        .btn {
            display: inline-block;
            font-family: Impact, system-ui, sans-serif;
            font-size: 1.6rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            padding: 18px 48px;
            background: #ff3b00;
            color: #000000;
            border: 4px solid #ffffff;
            cursor: pointer;
            transition: all 0.1s ease;
            text-decoration: none;
            line-height: 1;
            border-radius: 2px;
        }
        .btn:hover,
        .btn:focus {
            background: #ffffff;
            color: #ff3b00;
            border-color: #ff3b00;
            transform: scale(0.97);
        }
        .btn-ghost {
            background: transparent;
            color: #ff3b00;
            border-color: #ff3b00;
        }
        .btn-ghost:hover {
            background: #ff3b00;
            color: #000;
        }

        /* HEADER + NAV */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 48px;
            padding-bottom: 24px;
            border-bottom: 4px solid #ff3b00;
            position: relative;
            background: #000000;
            z-index: 100;
        }
        .logo {
            font-family: Impact, system-ui, sans-serif;
            font-size: 2.8rem;
            line-height: 1;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: -0.04em;
        }
        .logo span {
            color: #ff3b00;
        }
        nav ul {
            list-style: none;
            display: flex;
            gap: 32px;
            align-items: center;
        }
        nav a {
            font-family: Impact, system-ui, sans-serif;
            font-size: 1.2rem;
            text-transform: uppercase;
            color: #ffffff;
            border: none;
            padding: 8px 0;
            border-bottom: 3px solid transparent;
        }
        nav a:hover {
            border-bottom-color: #ff3b00;
        }
        /* hamburger – pure CSS */
        .hamburger {
            display: none;
            flex-direction: column;
            gap: 6px;
            cursor: pointer;
            padding: 8px;
            background: none;
            border: 2px solid #ff3b00;
            border-radius: 2px;
        }
        .hamburger span {
            display: block;
            width: 30px;
            height: 4px;
            background: #ffffff;
            transition: 0.2s;
        }
        #menu-toggle {
            display: none;
        }
        #menu-toggle:checked~nav ul {
            max-height: 600px;
            opacity: 1;
            pointer-events: all;
        }
        #menu-toggle:checked~.hamburger span:nth-child(1) {
            transform: rotate(45deg) translate(7px, 7px);
        }
        #menu-toggle:checked~.hamburger span:nth-child(2) {
            opacity: 0;
        }
        #menu-toggle:checked~.hamburger span:nth-child(3) {
            transform: rotate(-45deg) translate(7px, -7px);
        }

        /* HERO */
        .hero {
            display: flex;
            flex-direction: column;
            gap: 48px;
            padding: 24px 0;
            min-height: 70vh;
            justify-content: center;
            border-bottom: 4px solid #ff3b00;
            margin-bottom: 120px;
            position: relative;
        }
        .hero::after {
            content: '⚡⚡⚡';
            position: absolute;
            right: 0;
            bottom: -24px;
            font-size: 4rem;
            opacity: 0.3;
            transform: rotate(10deg);
        }
        .hero h1 {
            max-width: 12ch;
        }
        .hero .sub {
            font-size: 1.4rem;
            max-width: 40ch;
            color: #ccc;
            border-left: 4px solid #ff3b00;
            padding-left: 24px;
            margin-top: -24px;
        }
        .hero .cta-group {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
            align-items: center;
        }

        /* REVIEWS */
        .reviews-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 48px;
            margin-top: 48px;
        }
        .review-card {
            background: #0f0f0f;
            border: 4px solid #ff3b00;
            padding: 32px 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            border-radius: 2px;
            transform: rotate(var(--rot, 0deg));
            transition: transform 0.15s;
        }
        .review-card:nth-child(odd) {
            --rot: -1deg;
        }
        .review-card:nth-child(even) {
            --rot: 1.5deg;
        }
        .review-card:hover {
            transform: rotate(0deg) scale(1.02);
            border-color: #ffffff;
        }
        .review-card .meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            color: #aaa;
            border-bottom: 2px solid #333;
            padding-bottom: 8px;
        }
        .review-card .stars {
            color: #ff3b00;
            font-size: 1.3rem;
            letter-spacing: 2px;
        }
        .review-card blockquote {
            font-style: normal;
            font-weight: 400;
            color: #ddd;
            line-height: 1.5;
            font-size: 1rem;
        }
        .review-card .author {
            font-family: Impact, system-ui, sans-serif;
            font-size: 1.2rem;
            color: #ffffff;
            text-transform: uppercase;
        }

        /* FEATURES / 서비스 */
        .feature-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 48px;
            margin: 48px 0;
        }
        .feature-item {
            border-top: 6px solid #ff3b00;
            padding-top: 24px;
        }
        .feature-item h3 {
            font-size: 1.8rem;
            margin-bottom: 8px;
        }
        .feature-item p {
            color: #aaa;
            font-size: 1rem;
        }
        .feature-item .icon {
            font-size: 3rem;
            line-height: 1;
            display: block;
            margin-bottom: 16px;
        }

        /* FOOTER */
        footer {
            border-top: 4px solid #ff3b00;
            padding-top: 48px;
            padding-bottom: 48px;
            margin-top: 48px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 24px;
            background: #050505;
        }
        footer .copy {
            font-size: 0.9rem;
            color: #888;
        }
        footer .phone {
            font-family: Impact, system-ui, sans-serif;
            font-size: 1.8rem;
            color: #ff3b00;
            text-decoration: none;
            border: none;
        }
        footer .phone:hover {
            text-decoration: underline;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            header {
                padding: 24px 16px;
                flex-wrap: wrap;
                gap: 16px;
            }
            .logo {
                font-size: 2rem;
            }
            .hamburger {
                display: flex;
            }
            nav ul {
                flex-direction: column;
                width: 100%;
                max-height: 0;
                opacity: 0;
                pointer-events: none;
                overflow: hidden;
                transition: max-height 0.3s ease, opacity 0.2s ease;
                background: #000;
                padding: 0;
                gap: 0;
                border-top: 2px solid #ff3b00;
                margin-top: 8px;
            }
            nav ul li {
                width: 100%;
                text-align: center;
                padding: 12px 0;
                border-bottom: 1px solid #222;
            }
            nav ul li a {
                font-size: 1.4rem;
                display: block;
            }
            #menu-toggle:checked~nav ul {
                max-height: 500px;
                opacity: 1;
                pointer-events: all;
                padding: 8px 0;
            }
            .grid-2,
            .asymmetric {
                grid-template-columns: 1fr;
                gap: 48px;
            }
            .bleed-left,
            .bleed-right {
                margin-left: 0;
                margin-right: 0;
                transform: none;
            }
            .overlap {
                margin-top: 0;
            }
            .hero h1 {
                font-size: 3rem;
            }
            .hero .sub {
                font-size: 1rem;
            }
            section {
                padding: 48px 0;
                margin-bottom: 72px;
            }
            header,
            main,
            footer {
                padding-left: 16px;
                padding-right: 16px;
            }
            .container {
                padding: 0 8px;
            }
            .btn {
                font-size: 1.2rem;
                padding: 14px 32px;
            }
            .reviews-grid {
                grid-template-columns: 1fr;
            }
            footer {
                flex-direction: column;
                text-align: center;
            }
            footer .phone {
                font-size: 1.4rem;
            }
            .skew-box {
                transform: none;
                padding: 24px;
            }
            .skew-box>* {
                transform: none;
            }
            .feature-list {
                grid-template-columns: 1fr 1fr;
            }
        }
        @media (max-width: 480px) {
            .feature-list {
                grid-template-columns: 1fr;
            }
            h1 {
                font-size: 2.6rem;
            }
            .hero .cta-group {
                flex-direction: column;
                align-items: stretch;
            }
        }

        /* UTILITY */
        .text-accent {
            color: #ff3b00;
        }
        .border-accent {
            border-color: #ff3b00;
        }
        .bg-strip {
            background: repeating-linear-gradient(45deg, #111, #111 8px, #000 8px, #000 16px);
</body>
